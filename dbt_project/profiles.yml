olist_dw:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: "{{ env_var('GCP_DATASET') }}"
      threads: 4
      keyfile: "/root/.google/credentials/gcp-credentials.json"
      location: US # or your preferred GCP region
      priority: interactive
      timeout_seconds: 300