version: 2

sources:
  - name: raw_olist
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: "{{ env_var('GCP_DATASET') }}"
    tables:
      - name: orders
      - name: customers
      - name: geolocation
      - name: order_items
      - name: order_payments
      - name: order_reviews
      - name: product_category_name_translation
      - name: products
      - name: sellers

models:
  - name: stg_orders
    description: "Staging model for orders (normalized dates, selected cols)"
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: order_status
      - name: purchase_date
        description: "Order purchase date (casted)"
      - name: approved_date
      - name: delivered_carrier_date
      - name: estimated_delivery_date
      - name: delivered_date

  - name: stg_customers
    description: "Staging model for customers"
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: stg_geolocation
    description: "Staging model for geolocation"
    columns:
      - name: geolocation_zip_code_prefix
        tests:
          - not_null

  - name: stg_order_items
    description: "Staging model for order_items"
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: order_item_id
        tests:
          - not_null

  - name: stg_order_payments
    description: "Staging model for order_payments"
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: payment_value

  - name: stg_order_reviews
    description: "Staging model for order_reviews"
    columns:
      - name: review_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: review_score

  - name: stg_product_category_name_translation
    description: "Staging model for product_category_name_translation"
    columns:
      - name: product_category_name
        tests:
          - not_null

  - name: stg_products
    description: "Staging model for products"
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
      - name: product_category_name

  - name: stg_sellers
    description: "Staging model for sellers"
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique
      - name: seller_zip_code_prefix
