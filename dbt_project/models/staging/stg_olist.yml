version: 2

sources:
  - name: raw_olist
    schema: raw_olist
    tables:
      - name: orders
        description: "Raw orders table from Olist"
        columns:
          - name: order_id
            description: "Primary order identifier"
            tests:
              - not_null
              - unique
          - name: customer_id
            description: "Customer identifier"
            tests:
              - not_null
          - name: order_status
            description: "Status of the order"
          - name: order_purchase_timestamp
            description: "Purchase timestamp (raw)"
          - name: order_approved_at
            description: "Order approved timestamp (raw)"
          - name: order_delivered_carrier_date
            description: "Date delivered to carrier (raw)"
          - name: order_delivered_customer_date
            description: "Date delivered to customer (raw)"
          - name: order_estimated_delivery_date
            description: "Estimated delivery date (raw)"

models:
  - name: stg_orders
    description: "Staging model for orders (normalized dates, selected cols)"
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: order_status
      - name: purchase_date
        description: "Order purchase date (casted)"
      - name: approved_date
      - name: delivered_carrier_date
      - name: estimated_delivery_date
      - name: delivered_date

  - name: stg_customers
    description: "Staging model for customers"
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: stg_geolocation
    description: "Staging model for geolocation"
    columns:
      - name: geolocation_zip_code_prefix
        tests:
          - not_null

  - name: stg_order_items
    description: "Staging model for order_items"
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: order_item_id
        tests:
          - not_null

  - name: stg_order_payments
    description: "Staging model for order_payments"
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: payment_value

  - name: stg_order_reviews
    description: "Staging model for order_reviews"
    columns:
      - name: review_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: review_score

  - name: stg_product_category_name_translation
    description: "Staging model for product_category_name_translation"
    columns:
      - name: product_category_name
        tests:
          - not_null

  - name: stg_products
    description: "Staging model for products"
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
      - name: product_category_name

  - name: stg_sellers
    description: "Staging model for sellers"
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique
      - name: seller_zip_code_prefix
